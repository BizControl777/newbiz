<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="icon/iconiconbiz.ico" />
    <title>BizController 360</title>
  </head>
  <body>
    <div class="system-footer">Elvatech copyright todos os direitos reservados 2026</div>
    <!-- TELA DE ATIVAÇÃO DE LICENÇA -->
    <div id="license-screen" class="hidden">
      <div class="login-box">
        <div class="logo-area">
          <div class="logo-icon"><i class="fa-solid fa-key"></i></div>
          <div class="logo-title">Ativação de Sistema</div>
          <div class="logo-sub">Insira sua chave de licença para continuar</div>
        </div>
        <div class="form-group">
          <label>Chave de Licença</label>
          <input type="text" id="license-key" placeholder="XXXX-XXXX-XXXX-XXXX" />
        </div>
        <div class="form-group">
          <label>Nome da Empresa</label>
          <input type="text" id="license-company" placeholder="Ex: Minha Loja" />
        </div>
        <div class="form-group">
          <label>Telefone de Contacto</label>
          <input type="text" id="license-phone" placeholder="+258 ..." />
        </div>
        <button type="button" class="btn-primary" id="activate-btn">Ativar Agora</button>
        <div class="demo-hint">Este dispositivo será vinculado à sua licença.</div>
      </div>
    </div>

    <!-- LOGIN -->
    <div id="login-screen">
      <div class="login-box">
        <div class="logo-area">
          <div class="logo-icon"><img src="icon/iconiconbiz.ico" style="width:48px;height:48px;"></div>
          <div class="logo-title">BizController 360</div>
          <div class="logo-sub">Gestão de Stock & Vendas</div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="text" id="login-user" placeholder="ex: admin@bizcontrol.local" value="" />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="login-pass" placeholder="••••••" value="" />
        </div>
        <button type="button" class="btn-primary" id="login-submit-btn">Entrar no Sistema</button>
        <div class="demo-hint">Abra via Electron para autenticar com base de dados.</div>
      </div>
    </div>

    <!-- APP SHELL -->
    <div id="app-shell" class="hidden">
      <div class="topbar">
        <div class="topbar-left">
          <span class="topbar-logo"
            ><i class="fa-solid fa-chart-simple" style="margin-right: 8px"></i>
            BizController 360</span
          >
          <span class="topbar-company" id="topbar-company">Empresa Demo</span>
        </div>
        <div class="topbar-user">
          <div style="text-align: right">
            <div class="user-name" id="topbar-username">—</div>
            <div class="user-role" id="topbar-userrole">—</div>
          </div>
          <div class="user-avatar" id="topbar-avatar">?</div>
          <button type="button" class="btn-logout" id="logout-btn">Sair</button>
        </div>
      </div>
      <div class="main-layout">
        <div class="sidebar" id="sidebar"></div>
        <div class="content" id="content-area"></div>
      </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay hidden" id="modal-overlay">
      <div class="modal" id="modal-body"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html></body>
</html>
